<div class="novo-produto">
    <h2>Novo Produto</h2>

    <label>Nome:</label>
    <input id="nome" type="text" />

    <label>Categoria:</label>
    <select id="categoria">
        <option value="">Selecione uma categoria</option>
    </select>

    <label>Preço:</label>
    <input id="preco" type="number" />

    <label>Custo:</label>
    <input id="custo" type="number" />

    <label>Estoque:</label>
    <input id="estoque" type="number" />

    <label>Estoque mínimo:</label>
    <input id="estoque_minimo" type="number" />

    <button id="salvarProduto">💾 Salvar Produto</button>
</div>

<script src="js/novoProduto.js"></script>
